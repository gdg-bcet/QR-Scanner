<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Shirt Scanner — GDG Cloud Study Jams</title>
    <meta name="description" content="QR code scanner for T-Shirt distribution at Google Cloud Study Jams 2025">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-badge">
                <span class="dot"></span>
                Cloud Study Jams 2025
            </div>
            <h1>T-Shirt Scanner</h1>
            <p>Scan a participant's QR code to verify &amp; collect</p>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-chip total">
                <span class="value" id="stat-total">—</span>
                <span class="label">Total</span>
            </div>
            <div class="stat-chip taken">
                <span class="value" id="stat-taken">—</span>
                <span class="label">Collected</span>
            </div>
            <div class="stat-chip remaining">
                <span class="value" id="stat-remaining">—</span>
                <span class="label">Remaining</span>
            </div>
        </div>

        <!-- Scanner Area -->
        <div class="scanner-container">
            <!-- Placeholder (before scanning) -->
            <div id="scanner-placeholder" class="scanner-placeholder">
                <div class="scanner-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="8" height="8" rx="1"/>
                        <rect x="14" y="2" width="8" height="8" rx="1"/>
                        <rect x="2" y="14" width="8" height="8" rx="1"/>
                        <path d="M14 14h2v2h-2z"/><path d="M20 14h2v2h-2z"/>
                        <path d="M14 20h2v2h-2z"/><path d="M20 20h2v2h-2z"/>
                        <path d="M17 14h0v8"/><path d="M14 17h8"/>
                    </svg>
                </div>
                <h3>Ready to Scan</h3>
                <p>Position a participant's QR code in front of the camera</p>
                <button class="btn-primary btn-scan" id="btn-start-scan">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                    Tap to Scan
                </button>
            </div>

            <!-- Live Scanner (while scanning) -->
            <div id="scanner-live" style="display:none; width:100%; flex-direction:column; align-items:center; gap:20px;">
                <div id="reader"></div>
                <button class="btn-primary btn-stop" id="btn-stop-scan">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
                    Stop Scanning
                </button>
            </div>
        </div>

        <!-- Dashboard Link -->
        <div style="margin-top: 24px;">
            <a href="/dashboard" class="nav-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                View All Participants
            </a>
        </div>
    </div>

    <script src="/static/app.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initScannerPage);
    </script>
</body>
</html>
