services:
  - type: web
    name: qr-scanner
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: SHEET_NAME
        value: Sheet1
      - key: GOOGLE_CREDENTIALS
        sync: false
